name: Deploy website
on:
  push:
    branches:
      - main
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/checkout@v3
      - name: Install dependencies
        run: npm ci
      - name: Upload Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: dist
          path: dist

  
  upload-artifact:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Get Code
        uses: actions/checkout@v3

      - name: Install Dependencies
        runs: npm ci
      
      - name: download Artifacts
        uses: actions/download-artifact@v3
        with:
          name: dist
          path: dist
      - name: list files
        run: ls 
        
