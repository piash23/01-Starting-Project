name: Deploy website
on:
  push:
    branches:
      - main
jobs:
  test:
    runs-on: ubuntu-latest
    outputs:
      test-data: ${{ steps.testt.outputs.test }}
    steps:
      - name: Get code
        uses: actions/checkout@v3
      - name: Install dependencies
        run: npm ci
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
      - name: write outputs
        id: testt
        run: echo "data=tesing 123" >> "$GITHUB_OUTPUT"

  
  upload-artifact:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Get Code
        uses: actions/checkout@v3

      - name: Install Dependencies
        run: npm ci
      
      - name: download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          # path: dist
      - name: list files
        run: ls 

      - name: output value utilization
        run: echo "the message is: ${{ needs.test.outputs.test-data }}"
        
